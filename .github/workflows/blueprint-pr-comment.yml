name: Blueprint PR Comment

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  blueprint-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Blueprint
        run: npm run build

      - name: Blueprint validate (strict CI)
        run: node dist/cli/index.js validate --strict
        env:
          BLUEPRINT_EMBED_MOCK: "1"

      - name: Collect Blueprint outputs for PR comment
        run: |
          node dist/cli/index.js doctor > blueprint-doctor.txt
          node dist/cli/index.js check --format=markdown > blueprint-check.md
          node dist/cli/index.js graph > blueprint-graph.txt
          node dist/cli/index.js adr check --format=markdown > blueprint-adr-check.md
        env:
          BLUEPRINT_EMBED_MOCK: "1"

      - name: Comment on PR (create or update)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const MARKER = "<!-- blueprint-pr-comment -->";
            const doctor = fs.readFileSync("blueprint-doctor.txt", "utf8").trim();
            const check = fs.readFileSync("blueprint-check.md", "utf8").trim();
            const adrCheck = fs.readFileSync("blueprint-adr-check.md", "utf8").trim();
            const graph = fs.readFileSync("blueprint-graph.txt", "utf8").trim();
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            const body = [
              MARKER,
              "## Blueprint Architecture Review",
              "",
              `Run: [workflow log](${runUrl})`,
              "",
              "### Doctor (summary)",
              "```text",
              doctor,
              "```",
              "",
              "### Policy check",
              check,
              "",
              "### ADR check",
              adrCheck,
              "",
              "### Architecture graph",
              "```text",
              graph,
              "```",
              "",
              "_Generated by [Blueprint MCP](https://github.com/Vedv7/BLUEPRINT.MCP)._"
            ].join("\n");

            const isBlueprintBot = (c) =>
              c.user?.type === "Bot" || c.user?.login === "github-actions[bot]";

            const isBlueprintComment = (c) =>
              typeof c.body === "string" &&
              (c.body.includes(MARKER) ||
                c.body.includes("## Blueprint Architecture Review"));

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const blueprintComments = comments.filter(
              (c) => isBlueprintBot(c) && isBlueprintComment(c)
            );

            const existing =
              blueprintComments.find((c) => c.body.includes(MARKER)) ??
              blueprintComments[0];

            let keptId;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
              keptId = existing.id;
              core.info(`Updated Blueprint comment ${existing.id}`);
            } else {
              const { data: created } = await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
              keptId = created.id;
              core.info("Created new Blueprint comment");
            }

            for (const dup of blueprintComments) {
              if (dup.id !== keptId) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: dup.id
                });
                core.info(`Removed duplicate Blueprint comment ${dup.id}`);
              }
            }
