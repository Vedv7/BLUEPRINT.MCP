name: Blueprint PR Comment

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  blueprint-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Blueprint
        run: npm run build

      - name: Run Blueprint scan
        run: node dist/cli/index.js scan

      - name: Collect Blueprint outputs
        id: blueprint
        run: |
          node dist/cli/index.js doctor > blueprint-doctor.txt
          node dist/cli/index.js check --format=markdown > blueprint-check.md
          node dist/cli/index.js graph > blueprint-graph.txt
          {
            echo "check<<EOF"
            cat blueprint-check.md
            echo "EOF"
            echo "graph<<EOF"
            cat blueprint-graph.txt
            echo "EOF"
            echo "doctor<<EOF"
            head -n 30 blueprint-doctor.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          BLUEPRINT_EMBED_MOCK: "1"

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const check = `${{ steps.blueprint.outputs.check }}`;
            const graph = `${{ steps.blueprint.outputs.graph }}`;
            const doctor = `${{ steps.blueprint.outputs.doctor }}`;
            const body = [
              "## Blueprint Architecture Review",
              "",
              "### Doctor (summary)",
              "```",
              doctor.trim(),
              "```",
              "",
              "### Policy check",
              check.trim(),
              "",
              "### Architecture graph",
              "```",
              graph.trim(),
              "```",
              "",
              "_Generated by [Blueprint MCP](https://github.com/Vedv7/BLUEPRINT.MCP) on this PR._"
            ].join("\n");
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
