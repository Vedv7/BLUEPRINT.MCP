name: Blueprint PR Comment

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  blueprint-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Blueprint
        run: npm run build

      - name: Run Blueprint scan
        run: node dist/cli/index.js scan
        env:
          BLUEPRINT_EMBED_MOCK: "1"

      - name: Collect Blueprint outputs
        run: |
          node dist/cli/index.js doctor > blueprint-doctor.txt
          node dist/cli/index.js check --format=markdown > blueprint-check.md
          node dist/cli/index.js graph > blueprint-graph.txt
        env:
          BLUEPRINT_EMBED_MOCK: "1"

      - name: Comment on PR (create or update)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const MARKER = "<!-- blueprint-pr-comment -->";
            const doctor = fs.readFileSync("blueprint-doctor.txt", "utf8").trim();
            const check = fs.readFileSync("blueprint-check.md", "utf8").trim();
            const graph = fs.readFileSync("blueprint-graph.txt", "utf8").trim();
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            const body = [
              MARKER,
              "## Blueprint Architecture Review",
              "",
              `Run: [workflow log](${runUrl})`,
              "",
              "### Doctor (summary)",
              "```text",
              doctor,
              "```",
              "",
              "### Policy check",
              check,
              "",
              "### Architecture graph",
              "```text",
              graph,
              "```",
              "",
              "_Generated by [Blueprint MCP](https://github.com/Vedv7/BLUEPRINT.MCP)._"
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const existing = comments.find(
              (c) =>
                typeof c.body === "string" &&
                c.body.includes(MARKER) &&
                (c.user.type === "Bot" || c.user.login === "github-actions[bot]")
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
              core.info(`Updated Blueprint comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
              core.info("Created new Blueprint comment");
            }
